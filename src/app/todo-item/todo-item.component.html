<button
  [routerLink]="['/todos', todo.id]"
  mat-icon-button
  aria-label="Example icon button with a vertical three dot icon"
>
  <mat-icon>link</mat-icon>
</button>
<mat-slide-toggle
  #checkbox
  [checked]="todo.completed"
  (change)="completed.emit(checkbox.checked)"
>{{ todo.title }}</mat-slide-toggle>
