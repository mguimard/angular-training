<span>
  <a [routerLink]="['/todos', todo.id]">Todo {{todo.id}}</a>

  <label
    [style.text-decoration-line]="todo.completed ? 'line-through' : 'none'"
  >
    {{ todo.title }}
    <input
      #checkbox
      type="checkbox"
      [checked]="todo.completed"
      (change)="completed.emit(checkbox.checked)"
    />
  </label>
</span>
