<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLinkActive="my-class" routerLink="home">Home (todos)</a>
      <a mat-list-item routerLinkActive="my-class" routerLink="pizzas">Pizzas</a>
      <a mat-list-item routerLinkActive="my-class" routerLink="contact">Contact</a>
      <a mat-list-item routerLinkActive="my-class" [routerLink]="'pizzas'">Pizzas</a>
      <a mat-list-item routerLinkActive="my-class" [routerLink]="['todos', 1234]">Todo 1234</a>
      <a mat-list-item routerLinkActive="my-class" routerLink="ajout">AJout pizza</a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        *ngIf="isHandset$ | async">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span>my-app</span>
    </mat-toolbar>
