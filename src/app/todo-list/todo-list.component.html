<mat-form-field>
  <mat-label>Ajouter un todo</mat-label>
  <input #new_todo matInput placeholder="New Todo" />
  <mat-icon matSuffix>event_list</mat-icon>
</mat-form-field>

<button type="button" mat-button (click)="service.addTodo(new_todo.value)">
  <mat-icon>add_box</mat-icon>
</button>

<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title> Todos <mat-icon aria-hidden="false" [matBadge]="completedTodos">home</mat-icon> </mat-card-title>
    <mat-card-subtitle>
      <!--
      <p [@completedTodos]="currentAnimationState">
        Todos (pipe version): {{ todos$ | async | completedCount }} /
        {{ (todos$ | async)?.length }}
      </p>
      -->

      <p [@completedTodos]="currentAnimationState">
        Todos (manual count version): {{ completedTodos }} /
        {{ (todos$ | async)?.length }}
      </p>
    </mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <mat-list role="list">
      @for((todo of (todos$ | async)| sortTodos) ; track todo.id){
      <mat-list-item role="listitem">
        <app-todo-item
          [todo]="todo"
          (completed)="service.update(todo, $event)"
        ></app-todo-item>
      </mat-list-item>
      } @empty {
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      }
    </mat-list>
  </mat-card-content>
  <mat-card-actions> </mat-card-actions>
</mat-card>
